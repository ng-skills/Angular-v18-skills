version: "1"

defaults:
  agent: claude
  provider: local
  trials: 5
  timeout: 300
  threshold: 0.8
  docker:
    base: node:20-slim
    setup: |
      npm install -g @angular/cli@18

tasks:
  # ─── Task 1: Standalone component with signal inputs ───
  - name: standalone-component-signal-inputs
    instruction: |
      Create an Angular v18 component called UserProfileComponent in user-profile.component.ts.
      It should have:
      - A required signal input "name" of type string
      - An optional signal input "email" with default empty string
      - An optional signal input "isAdmin" with default false, using booleanAttribute transform
      - A computed signal "displayName" that returns name in uppercase
      - A signal output "profileClicked" that emits the name
      - Use ChangeDetectionStrategy.OnPush
      - Use the host metadata for a click handler that emits profileClicked
      - Use @if control flow to conditionally show email
      The component must be standalone (no NgModules).

    workspace:
      - src: solutions/standalone-component.sh
        dest: standalone-component.sh

    graders:
      - type: deterministic
        run: |
          FILE="user-profile.component.ts"
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          if [ ! -f "$FILE" ]; then
            echo '{"score": 0.0, "details": "File not found"}'
            exit 0
          fi
          check "file-exists" true
          grep -q "input.required<string>()" "$FILE" 2>/dev/null; check "required-input" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "@Input()" "$FILE" 2>/dev/null; check "no-Input-decorator" "$([ $? -ne 0 ] && echo true || echo false)"
          grep -q "booleanAttribute" "$FILE" 2>/dev/null; check "booleanAttribute-transform" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "computed(" "$FILE" 2>/dev/null; check "uses-computed" "$([ $? -eq 0 ] && echo true || echo false)"
          (grep -q "output<" "$FILE" 2>/dev/null || grep -q "output()" "$FILE" 2>/dev/null); check "signal-output" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "@Output()" "$FILE" 2>/dev/null; check "no-Output-decorator" "$([ $? -ne 0 ] && echo true || echo false)"
          grep -q "OnPush" "$FILE" 2>/dev/null; check "OnPush-detection" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "host:" "$FILE" 2>/dev/null; check "host-metadata" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "@if" "$FILE" 2>/dev/null; check "uses-at-if" "$([ $? -eq 0 ] && echo true || echo false)"
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Does the component use signal-based input() and output() (NOT @Input/@Output decorators)?
          - Is booleanAttribute transform used for the boolean input?
          - Does it use computed() for derived state?
          - Does it use @if control flow (NOT *ngIf)?
          - Does it use host metadata (NOT @HostBinding/@HostListener)?
          - Is the component standalone (no NgModules)?
          - Is the code idiomatic Angular v18?
        weight: 0.3

    solution: solutions/standalone-component.sh

  # ─── Task 2: Service with inject() and signals ───
  - name: injectable-service-with-signals
    instruction: |
      Create an Angular v18 service called TodoService in todo.service.ts.
      It should:
      - Use @Injectable({ providedIn: 'root' })
      - Use inject() to get HttpClient (not constructor injection)
      - Manage a private writable signal for todos array
      - Expose a public readonly signal for the todos
      - Have a computed signal for the count of incomplete todos
      - Have methods: loadTodos() that fetches from '/api/todos', addTodo(title), toggleTodo(id), removeTodo(id)
      - Use toSignal() from @angular/core/rxjs-interop for the HTTP response

    workspace:
      - src: solutions/injectable-service.sh
        dest: injectable-service.sh

    graders:
      - type: deterministic
        run: |
          FILE="todo.service.ts"
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          if [ ! -f "$FILE" ]; then
            echo '{"score": 0.0, "details": "File not found"}'
            exit 0
          fi
          check "file-exists" true
          grep -q "providedIn: 'root'" "$FILE" 2>/dev/null; check "providedIn-root" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "inject(HttpClient)" "$FILE" 2>/dev/null; check "inject-function" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "constructor.*HttpClient" "$FILE" 2>/dev/null; check "no-constructor-DI" "$([ $? -ne 0 ] && echo true || echo false)"
          (grep -q "signal<" "$FILE" 2>/dev/null || grep -q "signal(" "$FILE" 2>/dev/null); check "uses-signal" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "asReadonly()" "$FILE" 2>/dev/null; check "readonly-signal" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "computed(" "$FILE" 2>/dev/null; check "uses-computed" "$([ $? -eq 0 ] && echo true || echo false)"
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Does the service use inject() instead of constructor injection?
          - Does it use signal() for state and asReadonly() for public access?
          - Does it use computed() for derived state (incomplete count)?
          - Is HttpClient used correctly with the functional API?
          - Does it avoid using deprecated patterns like HttpClientModule?
          - Is the code idiomatic Angular v18?
        weight: 0.3

    solution: solutions/injectable-service.sh

  # ─── Task 3: Reactive form (NOT template-driven) ───
  - name: reactive-form-not-template-driven
    instruction: |
      Create an Angular v18 registration form component called RegistrationFormComponent
      in registration-form.component.ts. It should have:
      - A typed reactive form with fields: firstName, lastName, email, password, confirmPassword
      - Use FormBuilder with nonNullable
      - firstName and lastName required
      - email required with email validator
      - password required with minLength(8)
      - A custom validator that checks password matches confirmPassword
      - Use @if control flow for validation messages
      - A submit method that only processes when form is valid
      Do NOT use template-driven forms or ngModel.

    workspace:
      - src: solutions/reactive-form.sh
        dest: reactive-form.sh

    graders:
      - type: deterministic
        run: |
          FILE="registration-form.component.ts"
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          if [ ! -f "$FILE" ]; then
            echo '{"score": 0.0, "details": "File not found"}'
            exit 0
          fi
          check "file-exists" true
          grep -q "ReactiveFormsModule" "$FILE" 2>/dev/null; check "reactive-forms" "$([ $? -eq 0 ] && echo true || echo false)"
          (grep -q "ngModel" "$FILE" 2>/dev/null || grep -q "[^a-zA-Z]FormsModule[^a-zA-Z]" "$FILE" 2>/dev/null); check "no-template-driven" "$([ $? -ne 0 ] && echo true || echo false)"
          grep -q "FormBuilder" "$FILE" 2>/dev/null; check "uses-FormBuilder" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "nonNullable" "$FILE" 2>/dev/null; check "uses-nonNullable" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "Validators.required" "$FILE" 2>/dev/null; check "has-validators" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "@if" "$FILE" 2>/dev/null; check "uses-at-if" "$([ $? -eq 0 ] && echo true || echo false)"
          (grep -q "inject(FormBuilder)" "$FILE" 2>/dev/null || grep -q "inject(NonNullableFormBuilder)" "$FILE" 2>/dev/null); check "inject-FormBuilder" "$([ $? -eq 0 ] && echo true || echo false)"
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Does it use Reactive Forms (NOT template-driven forms with ngModel)?
          - Does it use FormBuilder with nonNullable?
          - Does it use inject() for FormBuilder?
          - Are proper validators applied to each field?
          - Is there a custom validator for password matching?
          - Does it use @if control flow (NOT *ngIf)?
          - Is the component standalone?
        weight: 0.3

    solution: solutions/reactive-form.sh

  # ─── Task 4: Routing with functional guards ───
  - name: routing-with-functional-guards
    instruction: |
      Create Angular v18 routing configuration:
      1. auth.guard.ts - A functional route guard (CanActivateFn) that checks if user is
         authenticated via AuthService.isAuthenticated() signal. If not, redirect to /login
         with returnUrl query param.
      2. app.routes.ts - Routes configuration with:
         - '' redirects to '/dashboard'
         - 'login' loads LoginComponent lazily
         - 'dashboard' loads DashboardComponent lazily, protected by authGuard
         - 'users/:id' loads UserDetailComponent lazily, with route input binding
         - '**' shows NotFoundComponent
      3. app.config.ts - ApplicationConfig using provideRouter with withComponentInputBinding()

    workspace:
      - src: solutions/routing-guards.sh
        dest: routing-guards.sh

    graders:
      - type: deterministic
        run: |
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          [ -f "auth.guard.ts" ]; check "guard-file" "$([ $? -eq 0 ] && echo true || echo false)"
          if [ -f "auth.guard.ts" ]; then
            grep -q "CanActivateFn" "auth.guard.ts" 2>/dev/null; check "functional-guard" "$([ $? -eq 0 ] && echo true || echo false)"
            grep -q "inject(" "auth.guard.ts" 2>/dev/null; check "guard-inject" "$([ $? -eq 0 ] && echo true || echo false)"
          else
            check "functional-guard" false; check "guard-inject" false
          fi
          [ -f "app.routes.ts" ]; check "routes-file" "$([ $? -eq 0 ] && echo true || echo false)"
          if [ -f "app.routes.ts" ]; then
            grep -q "loadComponent" "app.routes.ts" 2>/dev/null; check "lazy-loading" "$([ $? -eq 0 ] && echo true || echo false)"
          else
            check "lazy-loading" false
          fi
          [ -f "app.config.ts" ]; check "config-file" "$([ $? -eq 0 ] && echo true || echo false)"
          if [ -f "app.config.ts" ]; then
            grep -q "withComponentInputBinding" "app.config.ts" 2>/dev/null; check "input-binding" "$([ $? -eq 0 ] && echo true || echo false)"
            grep -q "provideRouter" "app.config.ts" 2>/dev/null; check "provide-router" "$([ $? -eq 0 ] && echo true || echo false)"
          else
            check "input-binding" false; check "provide-router" false
          fi
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Does the guard use CanActivateFn (functional, not class-based)?
          - Does it use inject() for dependencies?
          - Does the route config use lazy loading with loadComponent?
          - Is provideRouter used with withComponentInputBinding?
          - Is there proper redirect and wildcard route handling?
          - Does the guard redirect to /login with returnUrl?
        weight: 0.3

    solution: solutions/routing-guards.sh

  # ─── Task 5: HTTP with functional interceptors ───
  - name: http-functional-interceptors
    instruction: |
      Create Angular v18 HTTP configuration:
      1. auth.interceptor.ts - A functional HTTP interceptor (HttpInterceptorFn) that adds
         Authorization Bearer token from AuthService.getToken() to all requests.
      2. error.interceptor.ts - A functional interceptor that catches 401 errors and
         redirects to /login using Router.
      3. user.service.ts - A service that uses inject(HttpClient) to make CRUD requests
         to '/api/users'. Include getAll, getById, create, update, delete methods.
      Use provideHttpClient with withInterceptors, NOT HttpClientModule.

    workspace:
      - src: solutions/http-interceptors.sh
        dest: http-interceptors.sh

    graders:
      - type: deterministic
        run: |
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          for f in auth.interceptor.ts error.interceptor.ts user.service.ts; do
            [ -f "$f" ]; check "${f}-exists" "$([ $? -eq 0 ] && echo true || echo false)"
          done
          if [ -f "auth.interceptor.ts" ]; then
            grep -q "HttpInterceptorFn" "auth.interceptor.ts" 2>/dev/null; check "functional-interceptor" "$([ $? -eq 0 ] && echo true || echo false)"
          fi
          if [ -f "user.service.ts" ]; then
            grep -q "inject(HttpClient)" "user.service.ts" 2>/dev/null; check "inject-HttpClient" "$([ $? -eq 0 ] && echo true || echo false)"
            grep -q "HttpClientModule" "user.service.ts" 2>/dev/null; check "no-HttpClientModule" "$([ $? -ne 0 ] && echo true || echo false)"
          fi
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Do interceptors use HttpInterceptorFn (NOT class-based interceptors)?
          - Does the auth interceptor use inject() for AuthService?
          - Does the error interceptor handle 401 and redirect?
          - Does the service use inject(HttpClient)?
          - Are CRUD methods properly implemented?
          - Does it avoid HttpClientModule in favor of provideHttpClient?
        weight: 0.3

    solution: solutions/http-interceptors.sh

  # ─── Task 6: Negative test — must NOT use Angular 19+ APIs ───
  - name: no-angular-19-plus-apis
    instruction: |
      Create an Angular v18 component called ProductListComponent in product-list.component.ts.
      It should:
      - Fetch products from '/api/products' using HttpClient
      - Display them in a list with @for control flow
      - Have a search input that filters products with debounce
      - Show loading state while fetching
      Use Angular v18 APIs only. Convert the HTTP observable to a signal for template use.

    workspace:
      - src: solutions/no-v19-apis.sh
        dest: no-v19-apis.sh

    graders:
      - type: deterministic
        run: |
          FILE="product-list.component.ts"
          PASSED=0; TOTAL=0; DETAILS=""
          check() {
            TOTAL=$((TOTAL+1))
            if [ "$2" = "true" ]; then PASSED=$((PASSED+1)); DETAILS="$DETAILS  pass: $1;"; else DETAILS="$DETAILS  fail: $1;"; fi
          }
          if [ ! -f "$FILE" ]; then
            echo '{"score": 0.0, "details": "File not found"}'
            exit 0
          fi
          check "file-exists" true
          grep -q "linkedSignal" "$FILE" 2>/dev/null; check "no-linkedSignal" "$([ $? -ne 0 ] && echo true || echo false)"
          (grep -q "resource(" "$FILE" 2>/dev/null || grep -q "httpResource" "$FILE" 2>/dev/null); check "no-resource-api" "$([ $? -ne 0 ] && echo true || echo false)"
          grep -q "toSignal" "$FILE" 2>/dev/null; check "uses-toSignal" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "@for" "$FILE" 2>/dev/null; check "uses-at-for" "$([ $? -eq 0 ] && echo true || echo false)"
          grep -q "\\*ngFor" "$FILE" 2>/dev/null; check "no-ngFor" "$([ $? -ne 0 ] && echo true || echo false)"
          SCORE=$(node -e "console.log(($PASSED/$TOTAL).toFixed(2))")
          echo "{\"score\": $SCORE, \"details\": \"$PASSED/$TOTAL checks passed.$DETAILS\"}"
        weight: 0.7

      - type: llm_rubric
        rubric: |
          - Does it use toSignal() (NOT resource/httpResource which are Angular 19+)?
          - Does it use @for control flow (NOT *ngFor)?
          - Does it avoid linkedSignal (Angular 19+)?
          - Does it use inject() for dependencies?
          - Is the debounce implemented correctly (toObservable + debounceTime + switchMap)?
          - Is the component standalone?
          - Is this idiomatic Angular v18 code?
        weight: 0.3

    solution: solutions/no-v19-apis.sh
